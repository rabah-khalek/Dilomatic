name: Validate Dataset

on:
  push:
    paths:
      - "data/*.json"
      - "schemas/**"
      - ".github/**"
      - "Makefile"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CITATION.cff"
      - "datapackage.json"
      - "LICENSE"
  pull_request:
    paths:
      - "data/*.json"
      - "schemas/**"
      - ".github/**"
      - "Makefile"
      - "README.md"
      - "CONTRIBUTING.md"
      - "CITATION.cff"
      - "datapackage.json"
      - "LICENSE"

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: .github/requirements-ci.txt

      - name: Install schema validator
        run: pip install -r .github/requirements-ci.txt --quiet

      - name: Validate repository metadata
        run: ./.github/scripts/validate-metadata.sh

      - name: Validate event file syntax
        run: ./.github/scripts/validate-json.sh

      - name: Validate event files against schema
        run: ./.github/scripts/validate-schema.sh

      - name: Run record integrity checks
        env:
          CHECK_URL_REACHABILITY: warn
        run: ./.github/scripts/integrity-check.sh

      - name: Validate inline quote citations
        run: ./.github/scripts/validate-quotes.sh

      - name: Run security checks
        run: ./.github/scripts/security-check.sh

  trigger-site-deploy:
    needs: validate
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger parent site rebuild
        env:
          GH_TOKEN: ${{ secrets.SITE_DEPLOY_TOKEN }}
          SITE_REPO: ${{ secrets.SITE_REPO }}
        run: |
          if [ -z "${GH_TOKEN:-}" ] || [ -z "${SITE_REPO:-}" ]; then
            echo "SITE_DEPLOY_TOKEN or SITE_REPO is not configured; skipping site rebuild trigger."
            exit 0
          fi
          gh api "repos/$SITE_REPO/dispatches" \
            -f event_type=dilomatic-updated \
            -f "client_payload[sha]=$GITHUB_SHA"
